<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/index.css">
    <title>Codex / Creative Gallery</title>
  </head>
  <body>
    <div id="root" class="layout-root">
      <!-- Navbar -->
      <nav id="header" class="header">
        <a href="/" class="logo-link" onclick="handleLink(event, '/')">
          <div class="logo-box">
            Ben
          </div>
          <h1 class="logo-text">
            Codex / <span>Creative Gallery</span>
          </h1>
        </a>

        <div class="search-wrapper">
          <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input 
            type="text" 
            id="search"
            placeholder="Search projects..." 
            class="search-input"
          />
        </div>

        <div class="nav-actions">
          <a href="/favorites" onclick="handleLink(event, '/favorites')" class="nav-link">
            <svg id="icon-favorites" class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
            <span class="md:block hidden">Favorites</span>
          </a>
          <div class="divider"></div>
          <button id="toggle-theme" class="theme-toggle">
            <svg class="icon" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
          </button>
        </div>
      </nav>

      <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar lg:flex hidden">
          <nav class="sidebar-nav">
            <p class="sidebar-label">Navigation</p>
            <a href="/" id="link-dashboard" onclick="handleLink(event, '/')" class="side-link">Dashboard</a>
            <a href="/favorites" id="link-favorites" onclick="handleLink(event, '/favorites')" class="side-link">Favorites</a>

            <div class="sidebar-categories">
              <p class="sidebar-label">Categories</p>
              <div id="sidebar-categories" class="sidebar-nav">
                <!-- Categories will be injected here -->
              </div>
            </div>
          </nav>
        </aside>

        <!-- Main Content -->
        <main id="content" class="content-main">
          <!-- Content injected here -->
        </main>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <div id="footer-stats"></div>
        <div>Codex Lab</div>
      </footer>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
